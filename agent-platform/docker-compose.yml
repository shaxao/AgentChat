version: '3.8'

services:
  # ─── Agent Platform 后端 ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent-backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE_BASE_DIR=/data/workspaces
      - GIT_AUTHOR_NAME=AutoCode Agent
      - GIT_AUTHOR_EMAIL=agent@autocode.local
      - MAX_CONCURRENT_TASKS=5
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ./backend:/app
      - workspace-data:/data/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── 前端 ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Workspace 容器池 — 按需启动，不长期运行 ────────────────────
  workspace-pool-init:
    build:
      context: ./docker/workspace
      dockerfile: Dockerfile
    image: agent-workspace:latest
    container_name: agent-workspace-init
    command: ["echo", "Workspace image ready"]
    restart: "no"

  # ─── Redis — 任务队列 & WebSocket 状态 ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Nginx — 反向代理 + WebSocket 升级 ─────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  workspace-data:
  redis-data:

networks:
  default:
    name: agent-network
