server {
    listen 80;
    server_name _;

    # 字符编码
    charset utf-8;

    # 静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # 客户端请求体大小限制（文件上传）
    client_max_body_size 50M;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 安全 Header
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CSP：允许 Pyodide WebAssembly（cdn.jsdelivr.net）和 iframe 沙箱 JS 执行
    # unsafe-eval + wasm-unsafe-eval 是 Pyodide/WASM 的硬性要求
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; worker-src 'self' blob:; connect-src 'self' https://cdn.jsdelivr.net https://api.duckduckgo.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: http: https:; font-src 'self' data: https://cdn.jsdelivr.net;" always;

    # ---- 后端 API 反向代理 ----
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;

        # SSE / WebSocket 支持（流式对话）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # 转发客户端真实 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- AutoCode Agent API 反向代理 ----
    location /autocode-api/ {
        proxy_pass http://autocode-backend:8000/;
        proxy_http_version 1.1;

        # SSE 支持（任务流式推送）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;

        # 连接超时：后端可能启动较慢
        proxy_connect_timeout 30s;
        # 读超时：SSE 长连接 + Claude API 需要较长时间
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # 转发客户端真实 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /autocode-api;
    }

    # ---- H2 控制台（生产环境已禁用，此规则仅供本地调试参考）----
    # location /h2-console/ {
    #     proxy_pass http://backend:8080/h2-console/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    # }

    # ---- 学习文档站（VitePress，base=/learn/）----
    # 独立子路径，自带 SPA 路由回退；不影响主站 React SPA
    location /learn/ {
        alias /usr/share/nginx/html/learn/;
        index index.html;
        try_files $uri $uri/ /learn/index.html;
    }

    # ---- 静态资源缓存策略 ----
    # 带 hash 的构建产物长期缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- SPA 路由支持（React Router） ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
