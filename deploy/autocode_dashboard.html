<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Autocode - 计费与日志</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
h1{font-size:1.75rem;font-weight:700;color:#f8fafc}
.subtitle{color:#94a3b8;font-size:.9rem}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:2px solid #1e293b}
.tab{padding:.6rem 1.5rem;cursor:pointer;color:#94a3b8;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;font-weight:500;font-size:.9rem}
.tab:hover{color:#e2e8f0}
.tab.active{color:#60a5fa;border-bottom-color:#60a5fa}

/* Stats cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:#1e293b;border-radius:.75rem;padding:1.25rem;border:1px solid #334155}
.stat-card .label{font-size:.75rem;color:#94a3b8;margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:1.75rem;font-weight:700;color:#f1f5f9}
.stat-card .unit{font-size:.8rem;color:#64748b;margin-left:.25rem}
.stat-card .sub{font-size:.75rem;color:#64748b;margin-top:.25rem}

/* Cards & tables */
.card{background:#1e293b;border-radius:.75rem;padding:1.25rem;margin-bottom:1rem;border:1px solid #334155}
.card h2{font-size:1.05rem;font-weight:600;color:#f1f5f9;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{text-align:left;padding:.5rem .75rem;color:#94a3b8;font-weight:500;border-bottom:1px solid #334155;white-space:nowrap}
td{padding:.45rem .75rem;border-bottom:1px solid #1e293b;color:#cbd5e1}
tr:hover td{background:#0f172a}
.mono{font-family:'JetBrains Mono','Consolas',monospace;font-size:.78rem}
.badge{padding:.15rem .45rem;border-radius:.25rem;font-size:.72rem;font-weight:500}
.badge-success{background:#064e3b;color:#34d399}
.badge-error{background:#7f1d1d;color:#fca5a5}
.badge-warn{background:#78350f;color:#fbbf24}
.badge-info{background:#1e3a5f;color:#93c5fd}
.num{text-align:right;font-variant-numeric:tabular-nums}
.clickable{cursor:pointer;color:#60a5fa}
.clickable:hover{text-decoration:underline}

/* Filters */
.filters{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filters select,.filters input{padding:.35rem .65rem;background:#0f172a;border:1px solid #334155;border-radius:.3rem;color:#e2e8f0;font-size:.82rem}
.filters input::placeholder{color:#475569}
.filters button{padding:.35rem .85rem;background:#2563eb;color:#fff;border:none;border-radius:.3rem;cursor:pointer;font-size:.82rem;transition:background .2s}
.filters button:hover{background:#1d4ed8}
.pagination{display:flex;gap:.4rem;align-items:center;margin-top:.75rem;font-size:.82rem;color:#94a3b8}
.pagination button{padding:.25rem .6rem;background:#334155;color:#e2e8f0;border:none;border-radius:.25rem;cursor:pointer;font-size:.8rem}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination button:hover:not(:disabled){background:#475569}

/* Chart bar (simple CSS) */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:200px;padding:0 1rem}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;min-width:24px}
.bar{width:100%;background:#3b82f6;border-radius:3px 3px 0 0;min-height:2px;transition:height .5s}
.bar-label{font-size:.6rem;color:#94a3b8;margin-top:4px;transform:rotate(-45deg);transform-origin:top left;white-space:nowrap}
.bar-value{font-size:.65rem;color:#e2e8f0;margin-bottom:2px}

.loading{text-align:center;padding:3rem;color:#94a3b8}
.error{background:#7f1d1d;color:#fca5a5;padding:.75rem 1rem;border-radius:.5rem;margin-bottom:1rem}
.empty{text-align:center;padding:2rem;color:#64748b;font-size:.85rem}

/* Token formatter */
.token-val{font-weight:600}
.tooltip{position:relative;cursor:help;border-bottom:1px dotted #94a3b8}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div>
    <h1>Autocode 计费与日志</h1>
    <p class="subtitle">用量统计 · 执行日志 · 模型监控</p>
  </div>
  <div style="display:flex;gap:.5rem">
    <button onclick="refreshAll()" style="padding:.35rem .85rem;background:#334155;color:#e2e8f0;border:none;border-radius:.3rem;cursor:pointer;font-size:.82rem">🔄 刷新全部</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')">📊 概览</div>
  <div class="tab" onclick="switchTab('usage')">📋 用量明细</div>
  <div class="tab" onclick="switchTab('daily')">📈 每日趋势</div>
  <div class="tab" onclick="switchTab('logs')">📝 执行日志</div>
</div>

<!-- Overview -->
<div id="tab-overview" class="tab-content">
  <div id="overview-stats" class="stats"><div class="loading">加载中...</div></div>
  <div class="card"><h2>按模型汇总 (最近30天)</h2><div id="model-table"></div></div>
</div>

<!-- Usage details -->
<div id="tab-usage" class="tab-content" style="display:none">
  <div class="card">
    <div class="filters">
      <select id="usage-model" onchange="loadUsageLogs(1)"><option value="">全部模型</option></select>
      <select id="usage-status" onchange="loadUsageLogs(1)">
        <option value="">全部状态</option>
        <option value="success">成功</option>
        <option value="error">失败</option>
      </select>
      <select id="usage-days" onchange="loadUsageLogs(1)">
        <option value="1">1天</option>
        <option value="7" selected>7天</option>
        <option value="30">30天</option>
      </select>
      <button onclick="loadUsageLogs(1)">查询</button>
    </div>
    <div id="usage-table"></div>
    <div id="usage-pagination" class="pagination"></div>
  </div>
</div>

<!-- Daily trend -->
<div id="tab-daily" class="tab-content" style="display:none">
  <div class="card">
    <div class="filters">
      <select id="daily-days" onchange="loadDaily()">
        <option value="7">7天</option>
        <option value="14" selected>14天</option>
        <option value="30">30天</option>
      </select>
      <button onclick="loadDaily()">刷新</button>
    </div>
    <div id="daily-chart"></div>
    <div id="daily-table" style="margin-top:1rem"></div>
  </div>
</div>

<!-- Execution logs -->
<div id="tab-logs" class="tab-content" style="display:none">
  <div class="card">
    <div class="filters">
      <input type="text" id="logs-taskid" placeholder="任务 ID" style="width:180px" onkeydown="if(event.key==='Enter')loadLogs(1)">
      <select id="logs-level" onchange="loadLogs(1)">
        <option value="">全部级别</option>
        <option value="INFO">INFO</option>
        <option value="WARNING">WARNING</option>
        <option value="ERROR">ERROR</option>
      </select>
      <select id="logs-days" onchange="loadLogs(1)">
        <option value="1">1天</option>
        <option value="7" selected>7天</option>
        <option value="30">30天</option>
      </select>
      <button onclick="loadLogs(1)">查询</button>
    </div>
    <div id="logs-table"></div>
    <div id="logs-pagination" class="pagination"></div>
  </div>
</div>
</div>

<script>
const API = '/api';
let currentTab = 'overview';
let usagePage = 1, logsPage = 1;

function fmt(n) {
  if (n == null) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return String(Math.round(n));
}

function fmtMs(ms) {
  if (ms == null) return '-';
  if (ms < 1000) return Math.round(ms)+'ms';
  return (ms/1000).toFixed(1)+'s';
}

function badge(level) {
  const m = {INFO:'badge-info',WARNING:'badge-warn',WARN:'badge-warn',ERROR:'badge-error'};
  return `<span class="badge ${m[level]||'badge-info'}">${level}</span>`;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).style.display = 'block';
  if (tab === 'overview') loadOverview();
  if (tab === 'usage') loadUsageLogs(1);
  if (tab === 'daily') loadDaily();
  if (tab === 'logs') loadLogs(1);
}

function refreshAll() {
  if (currentTab === 'overview') loadOverview();
  if (currentTab === 'usage') loadUsageLogs(usagePage);
  if (currentTab === 'daily') loadDaily();
  if (currentTab === 'logs') loadLogs(logsPage);
}

async function apiGet(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

// ─── Overview ───
async function loadOverview() {
  try {
    const [stats, models] = await Promise.all([
      apiGet('/usage/stats?days=30'),
      apiGet('/usage/models')
    ]);

    // Stats cards
    const s = stats.summary;
    let cards = '';
    cards += `<div class="stat-card"><div class="label">总请求数</div><div class="value">${fmt(s.total_requests)}</div><div class="sub">${s.total_success} 成功 / ${s.total_fail} 失败</div></div>`;
    cards += `<div class="stat-card"><div class="label">总 Token 用量</div><div class="value">${fmt(s.total_tokens)}</div><div class="sub">30 天累计</div></div>`;
    cards += `<div class="stat-card"><div class="label">使用模型数</div><div class="value">${models.length}</div></div>`;
    cards += `<div class="stat-card"><div class="label">成功率</div><div class="value">${s.total_requests > 0 ? (s.total_success/s.total_requests*100).toFixed(1) : 0}<span class="unit">%</span></div></div>`;
    document.getElementById('overview-stats').innerHTML = cards;

    // Model table
    if (stats.models.length === 0) {
      document.getElementById('model-table').innerHTML = '<div class="empty">暂无数据</div>';
    } else {
      let html = '<table><tr><th>模型</th><th>场景</th><th class="num">请求数</th><th class="num">成功</th><th class="num">失败</th><th class="num">输入Token</th><th class="num">输出Token</th><th class="num">平均延迟</th></tr>';
      for (const m of stats.models) {
        html += `<tr>
          <td class="mono">${m.model}</td><td>${m.scene_type}</td>
          <td class="num">${m.request_count}</td>
          <td class="num" style="color:#34d399">${m.success_count}</td>
          <td class="num" style="color:#fca5a5">${m.fail_count}</td>
          <td class="num">${fmt(m.total_input_tokens)}</td>
          <td class="num">${fmt(m.total_output_tokens)}</td>
          <td class="num">${fmtMs(m.avg_latency_ms)}</td>
        </tr>`;
      }
      html += '</table>';
      document.getElementById('model-table').innerHTML = html;
    }

    // Populate model filter
    const sel = document.getElementById('usage-model');
    if (sel.options.length <= 1) {
      for (const m of models) {
        sel.appendChild(new Option(m.model + ' ('+m.cnt+')', m.model));
      }
    }
  } catch(e) {
    document.getElementById('overview-stats').innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
  }
}

// ─── Usage logs ───
async function loadUsageLogs(page) {
  usagePage = page || 1;
  const model = document.getElementById('usage-model').value;
  const status = document.getElementById('usage-status').value;
  const days = document.getElementById('usage-days').value;
  const params = new URLSearchParams({page: usagePage, page_size: 20, days});
  if (model) params.set('model', model);
  if (status) params.set('status', status);

  try {
    const data = await apiGet('/usage/logs?' + params);
    if (data.list.length === 0) {
      document.getElementById('usage-table').innerHTML = '<div class="empty">暂无数据</div>';
      document.getElementById('usage-pagination').innerHTML = '';
      return;
    }

    let html = '<table><tr><th style="width:60px">ID</th><th>用户</th><th>任务</th><th>模型</th><th class="num">输入Token</th><th class="num">输出Token</th><th class="num">延迟</th><th>状态</th><th>时间</th></tr>';
    for (const r of data.list) {
      const stBadge = r.status === 'success' ? 'badge-success' : 'badge-error';
      html += `<tr>
        <td class="mono" style="font-size:.7rem">${r.id}</td>
        <td>${r.user_id||'-'}</td>
        <td class="mono clickable" onclick="showTaskLogs('${r.task_id||''}')">${(r.task_id||'-').substring(0,8)}</td>
        <td class="mono">${r.model}</td>
        <td class="num">${fmt(r.input_tokens)}</td>
        <td class="num">${fmt(r.output_tokens)}</td>
        <td class="num">${fmtMs(r.latency_ms)}</td>
        <td><span class="badge ${stBadge}">${r.status}</span></td>
        <td style="font-size:.75rem;color:#94a3b8">${(r.created_at||'').substring(5,16)}</td>
      </tr>`;
    }
    html += '</table>';
    document.getElementById('usage-table').innerHTML = html;

    // Pagination
    const totalPages = Math.ceil(data.total / data.page_size);
    let pg = `<span>共 ${data.total} 条 / ${totalPages} 页</span>`;
    pg += `<button ${usagePage<=1?'disabled':''} onclick="loadUsageLogs(${usagePage-1})">上一页</button>`;
    pg += `<span>${usagePage}</span>`;
    pg += `<button ${usagePage>=totalPages?'disabled':''} onclick="loadUsageLogs(${usagePage+1})">下一页</button>`;
    document.getElementById('usage-pagination').innerHTML = pg;
  } catch(e) {
    document.getElementById('usage-table').innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
  }
}

// ─── Daily trend ───
async function loadDaily() {
  const days = document.getElementById('daily-days').value;
  try {
    const data = await apiGet('/usage/daily?days=' + days);

    // Bar chart
    if (data.daily.length === 0) {
      document.getElementById('daily-chart').innerHTML = '<div class="empty">暂无数据</div>';
    } else {
      const maxTokens = Math.max(...data.daily.map(d => d.total_tokens || 0), 1);
      let bars = '<div class="bar-chart">';
      for (const d of data.daily) {
        const pct = (d.total_tokens / maxTokens * 100).toFixed(1);
        const date = (d.stat_date || '').substring(5);
        bars += `<div class="bar-col">
          <div class="bar-value">${fmt(d.total_tokens)}</div>
          <div class="bar" style="height:${pct}%"></div>
          <div class="bar-label">${date}</div>
        </div>`;
      }
      bars += '</div>';
      document.getElementById('daily-chart').innerHTML = bars;
    }

    // Table
    if (data.daily.length === 0) {
      document.getElementById('daily-table').innerHTML = '';
    } else {
      let html = '<table><tr><th>日期</th><th class="num">请求数</th><th class="num">成功</th><th class="num">Token</th><th class="num">平均延迟</th></tr>';
      for (const d of data.daily.reverse()) {
        html += `<tr>
          <td>${d.stat_date}</td>
          <td class="num">${d.request_count}</td>
          <td class="num" style="color:#34d399">${d.success_count}</td>
          <td class="num">${fmt(d.total_tokens)}</td>
          <td class="num">${fmtMs(d.avg_latency_ms)}</td>
        </tr>`;
      }
      html += '</table>';
      document.getElementById('daily-table').innerHTML = html;
    }
  } catch(e) {
    document.getElementById('daily-chart').innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
  }
}

// ─── Execution logs ───
async function loadLogs(page) {
  logsPage = page || 1;
  const taskId = document.getElementById('logs-taskid').value.trim();
  const level = document.getElementById('logs-level').value;
  const days = document.getElementById('logs-days').value;
  const params = new URLSearchParams({page: logsPage, page_size: 30, days});
  if (taskId) params.set('task_id', taskId);
  if (level) params.set('level', level);

  try {
    const data = await apiGet('/logs?' + params);
    if (data.list.length === 0) {
      document.getElementById('logs-table').innerHTML = '<div class="empty">暂无数据</div>';
      document.getElementById('logs-pagination').innerHTML = '';
      return;
    }

    let html = '<table><tr><th style="width:60px">ID</th><th>任务</th><th>Agent</th><th>步骤</th><th>级别</th><th>消息</th><th>时间</th></tr>';
    for (const r of data.list) {
      html += `<tr>
        <td style="font-size:.7rem;color:#64748b">${r.id}</td>
        <td class="mono">${(r.task_id||'-').substring(0,12)}</td>
        <td style="font-size:.75rem">${r.agent_id||'-'}</td>
        <td style="font-size:.8rem">${r.step||'-'}</td>
        <td>${badge(r.level)}</td>
        <td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(r.message||'').substring(0,100)}</td>
        <td style="font-size:.72rem;color:#94a3b8">${(r.created_at||'').substring(5,16)}</td>
      </tr>`;
    }
    html += '</table>';
    document.getElementById('logs-table').innerHTML = html;

    const totalPages = Math.ceil(data.total / data.page_size);
    let pg = `<span>共 ${data.total} 条 / ${totalPages} 页</span>`;
    pg += `<button ${logsPage<=1?'disabled':''} onclick="loadLogs(${logsPage-1})">上一页</button>`;
    pg += `<span>${logsPage}</span>`;
    pg += `<button ${logsPage>=totalPages?'disabled':''} onclick="loadLogs(${logsPage+1})">下一页</button>`;
    document.getElementById('logs-pagination').innerHTML = pg;
  } catch(e) {
    document.getElementById('logs-table').innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
  }
}

function showTaskLogs(taskId) {
  if (!taskId) return;
  switchTab('logs');
  document.getElementById('logs-taskid').value = taskId;
  loadLogs(1);
}

// Init
loadOverview();
</script>
</body>
</html>
